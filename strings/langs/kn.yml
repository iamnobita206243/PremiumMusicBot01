lang_1 : "» ಈ ಗುಂಪಿಗೆ ಡೀಫಾಲ್ಟ್ ಭಾಷೆಯಾಗಿ ಹೊಂದಿಸಲು ನೀವು ಇಚ್ಛಿಸುವ ಭಾಷೆಯನ್ನು ಆರಿಸಿ :"
