setting_2 : "» ನೇರ : ಹುಡುಕಾಟ ಫಲಿತಾಂಶಗಳನ್ನು ನೇರವಾಗಿ ಪ್ಲೇ ಮಾಡುತ್ತದೆ.\n\n» ಇನ್‌ಲೈನ್ : ವಿಡಿಯೋ ಮತ್ತು ಆಡಿಯೋ ನಡುವೆ ಆಯ್ಕೆ ಮಾಡಲು ಇನ್‌ಲೈನ್ ಬಟನ್‌ಗಳನ್ನು ಒದಗಿಸುತ್ತದೆ."
setting_3 : "» ಎಲ್ಲರೂ : ಈ ಗುಂಪಿನಲ್ಲಿ ಯಾರಾದರೂ ಅಡ್ಮಿನ್ ಕಮಾಂಡ್‌ಗಳನ್ನು [skip, pause, resume ಇತ್ಯಾದಿ] ಬಳಸಬಹುದು.\n\n» ಅಡ್ಮಿನ್‌ಗಳು ಮಾತ್ರ : ಅಡ್ಮಿನ್‌ಗಳು ಮತ್ತು ಅಧಿಕೃತ ಬಳಕೆದಾರರು ಮಾತ್ರ ಅಡ್ಮಿನ್ ಕಮಾಂಡ್‌ಗಳನ್ನು ಬಳಸಬಹುದು."
setting_4 : "» ಯಾವುದೇ ಅಧಿಕೃತ ಬಳಕೆದಾರರು ಕಂಡುಬಂದಿಲ್ಲ."
setting_5 : "» ಗುಂಪು : ಕಮಾಂಡ್ ನೀಡಲಾದ ಗುಂಪಿನಲ್ಲಿ ಹಾಡುಗಳನ್ನು ಪ್ಲೇ ಮಾಡುತ್ತದೆ.\n\n» ಚಾನಲ್ : ನಿಮ್ಮ ಆಯ್ಕೆಯ ಚಾನಲ್‌ನಲ್ಲಿ ಹಾಡುಗಳನ್ನು ಪ್ಲೇ ಮಾಡುತ್ತದೆ. /channelplay ಮೂಲಕ ಚಾನಲ್ ID ಸೆಟ್ ಮಾಡಿ."
setting_6 : "» ಎಲ್ಲರೂ : ಈ ಗುಂಪಿನಲ್ಲಿ ಯಾರಾದರೂ ಹಾಡುಗಳನ್ನು ಪ್ಲೇ ಮಾಡಬಹುದು.\n\n» ಅಡ್ಮಿನ್‌ಗಳು ಮಾತ್ರ : ಈ ಗುಂಪಿನಲ್ಲಿ ಅಡ್ಮಿನ್‌ಗಳು ಮಾತ್ರ ಹಾಡುಗಳನ್ನು ಪ್ಲೇ ಮಾಡಬಹುದು."
