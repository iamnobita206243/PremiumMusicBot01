MD_B_12 : "ᴍᴇᴍʙᴇʀs ᴏɴʟʏ"

md_1 : "» ᴍᴇᴅɪᴀ ᴅᴇʟᴇᴛᴇ ᴘʀᴏᴛᴇᴄᴛɪᴏɴ ᴇɴᴀʙʟᴇᴅ."
md_2 : "» ᴍᴇᴅɪᴀ ᴅᴇʟᴇᴛᴇ ᴘʀᴏᴛᴇᴄᴛɪᴏɴ ᴅɪsᴀʙʟᴇᴅ."
md_3 : "» ᴍᴇᴅɪᴀ ᴅᴇʟᴇᴛᴇ ᴛɪᴍᴇ sᴇᴛ ᴛᴏ {0} ᴍɪɴᴜᴛᴇs."
md_4 : "» ᴍᴇᴅɪᴀ ᴅᴇʟᴇᴛᴇ ᴘʀᴏᴛᴇᴄᴛɪᴏɴ ᴡᴀs ᴀᴜᴛᴏ-ᴅɪsᴀʙʟᴇᴅ ʙᴇᴄᴀᴜsᴇ ᴘʀᴏᴛᴇᴄᴛɪᴏɴ ᴜsᴇʀʙᴏᴛ ᴡᴀs ʀᴇᴍᴏᴠᴇᴅ ᴏʀ ʟᴏsᴛ ᴀᴅᴍɪɴ ʀɪɢʜᴛs (ᴅᴇʟᴇᴛᴇ ᴍᴇssᴀɢᴇs ᴘᴇʀᴍɪssɪᴏɴ)."
md_5 : "» ʙᴏᴛ ᴍᴜsᴛ ʜᴀᴠᴇ `ᴅᴇʟᴇᴛᴇ ᴍᴇssᴀɢᴇs`, `ɪɴᴠɪᴛᴇ ᴜsᴇʀs` ᴀɴᴅ `ᴘʀᴏᴍᴏᴛᴇ ᴍᴇᴍʙᴇʀs` ᴘᴇʀᴍɪssɪᴏɴs ɪɴ ᴛʜɪs ɢʀᴏᴜᴘ ᴛᴏ ᴇɴᴀʙʟᴇ ᴛʜɪs ғᴇᴀᴛᴜʀᴇ."
md_6 : "» ᴀᴜᴛᴏ-ᴀᴅᴅɪɴɢ ᴘʀᴏᴛᴇᴄᴛɪᴏɴ ᴜsᴇʀʙᴏᴛ..."
md_7 : "» ᴍᴇᴅɪᴀ ᴅᴇʟᴇᴛᴇ ᴛᴀʀɢᴇᴛ ᴛʏᴘᴇ sᴇᴛ ᴛᴏ {0}."