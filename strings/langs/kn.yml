start_1 : "<emoji id=6172539951985464926>🥀</emoji> {0} ಆನ್‌ಲೈನ್‌ನಲ್ಲಿದೆ.\n\n<b>✫ ಅಪ್‌ಟೈಮ್ :</b> {1} <emoji id=6296577138615125756>🥀</emoji>"
start_2 : "ನಮಸ್ಕಾರ, {0} \nನಾನು {1}<emoji id=6172539951985464926>🥀</emoji>,\n\n<emoji id=5875371147595354391 >🥀</emoji> ನಾನು ವಿಶೇಷ ವೈಶಿಷ್ಟ್ಯಗಳನ್ನು ಹೊಂದಿದ್ದೇನೆ.\n<emoji id=5875371147595354391 >🥀</emoji> ಆಲ್-ಇನ್-ಒನ್ ಬಾಟ್.\n<emoji id=5875371147595354391 >🥀</emoji> ನೀವು ಧ್ವನಿ ಚಾಟ್‌ಗಳಲ್ಲಿ ಹಾಡುಗಳನ್ನು ಪ್ಲೇ ಮಾಡಬಹುದು.\n<emoji id=5875371147595354391 >🥀</emoji> ನೀವು ಚಿತ್ರಗಳನ್ನು ರಚಿಸಬಹುದು.\n<emoji id=5875371147595354391 >🥀</emoji> ನೀವು ಅನೇಕ ಭಾಷೆಗಳಿಗೆ ಅನುವಾದಿಸಬಹುದು.\n<emoji id=5875371147595354391 >🥀</emoji> ನಾನು ಮ್ಯೂಟ್, ಅನ್‌ಮ್ಯೂಟ್, ಬ್ಯಾನ್, ಕಿಕ್ ಇತ್ಯಾದಿಗಳನ್ನು ಮಾಡಬಲ್ಲೆ..\n<emoji id=5875371147595354391 >🥀</emoji> ವಿಶೇಷ ಸ್ವಾಗತ \n<emoji id=5875371147595354391 >🥀</emoji> ಇತರ ವೈಶಿಷ್ಟ್ಯಗಳು : ಕಮಾಂಡ್ ಬಟನ್ ಕ್ಲಿಕ್ ಮಾಡಿ...\n\n๏ ನನ್ನ ಮಾಡ್ಯೂಲ್‌ಗಳು ಮತ್ತು ಕಮಾಂಡ್‌ಗಳ ಬಗ್ಗೆ ಮಾಹಿತಿಗಾಗಿ ಸಹಾಯ ಬಟನ್ ಕ್ಲಿಕ್ ಮಾಡಿ."
start_3 : "ನಮಸ್ಕಾರ {0} <emoji id=6181554577238661818>🥀</emoji>,\nನಾನು {1}\n\nನನ್ನನ್ನು {2} ಗೆ ಸೇರಿಸಿದ್ದಕ್ಕಾಗಿ ಧನ್ಯವಾದಗಳು <emoji id=6172389267352851556>🥀</emoji>, {3} ಈಗ ಈ ಚಾಟ್‌ನಲ್ಲಿ ಹಾಡುಗಳನ್ನು ಪ್ಲೇ ಮಾಡಬಹುದು <emoji id=6215221185194497730>🥀</emoji>."
start_4 : "🎄 <b>ಸೂಪರ್‌ಗ್ರೂಪ್ ಅಗತ್ಯವಿದೆ</b> 🎄\n\nದಯವಿಟ್ಟು ನಿಮ್ಮ <b>ಗುಂಪನ್ನು</b> <b>ಸೂಪರ್‌ಗ್ರೂಪ್</b> ಆಗಿ ಪರಿವರ್ತಿಸಿ ಮತ್ತು ನಂತರ ನನ್ನನ್ನು ಮತ್ತೆ ಸೇರಿಸಿ.\n\n<b>ಸೂಪರ್‌ಗ್ರೂಪ್ ರಚಿಸುವುದು ಹೇಗೆ?</b>\n- ನಿಮ್ಮ ಗುಂಪಿನ ಚಾಟ್ ಹಿಸ್ಟರಿಯನ್ನು ಒಮ್ಮೆ <b>Visible</b> ಗೆ ಸೆಟ್ ಮಾಡಿ."
start_5 : "<b>↝ ಬ್ಲ್ಯಾಕ್‌ಲಿಸ್ಟ್ ಮಾಡಲಾದ ಚಾಟ್ ↜</b>\n\nಈ ಚಾಟ್ {0} ನ ಡೇಟಾಬೇಸ್‌ನಲ್ಲಿ ಬ್ಲ್ಯಾಕ್‌ಲಿಸ್ಟ್ ಮಾಡಲ್ಪಟ್ಟಿದೆ.\nಅನ್‌ಬ್ಲ್ಯಾಕ್‌ಲಿಸ್ಟ್ ಮಾಡಲು <a href={1}>Sudo ಬಳಕೆದಾರರನ್ನು</a> ಕೇಳಿ ಅಥವಾ <a href={2}>ಸಪೋರ್ಟ್ ಚಾಟ್‌ಗೆ</a> ಭೇಟಿ ನೀಡಿ."
start_6 : "😲 <b>ಹಾಡಿನ ಮಾಹಿತಿ</b> 😲\n\n📌 <b>ಶೀರ್ಷಿಕೆ :</b> {0}\n\n⏳ <b>ಸಮಯ :</b> {1} ನಿಮಿಷಗಳು\n👀 <b>ವೀಕ್ಷಣೆಗಳು :</b> <code>{2}</code>\n⏰ <b>ಪ್ರಕಟಿತ ದಿನಾಂಕ :</b> {3}\n📎 <b>ಚಾನಲ್ :</b> <a href={4}>{5}</a>\n\n<u><b>🥀 ಹುಡುಕಾಟವು {6} ರಿಂದ ನಡೆಸಲ್ಪಡುತ್ತದೆ</b></u>"

help_1 : "ನೀವು ಸಹಾಯ ಬಯಸುವ ವರ್ಗವನ್ನು ಆರಿಸಿ.\nನಿಮ್ಮ ಪ್ರಶ್ನೆಗಳನ್ನು <a href={0}>ಸಪೋರ್ಟ್ ಚಾಟ್</a> ನಲ್ಲಿ ಕೇಳಿ\n\nಎಲ್ಲಾ ಕಮಾಂಡ್‌ಗಳನ್ನು <code>/</code> ನೊಂದಿಗೆ ಬಳಸಬಹುದು"
