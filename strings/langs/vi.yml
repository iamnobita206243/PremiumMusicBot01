start_1 : "<emoji id=6172539951985464926>🥀</emoji> {0} đã trực tuyến rồi nè.\n\n<b>✫ Thời gian hoạt động:</b> {1} <emoji id=6296577138615125756>🥀</emoji>"
start_2 : "Chào {0}, \nTôi là {1}<emoji id=6172539951985464926>🥀</emoji>,\n\n<emoji id=5875371147595354391 >🥀</emoji> Tôi có những tính năng đặc biệt.\n<emoji id=5875371147595354391 >🥀</emoji> Bot tất cả trong một.\n<emoji id=5875371147595354391 >🥀</emoji> Bạn có thể phát nhạc trong cuộc trò chuyện thoại.\n<emoji id=5875371147595354391 >🥀</emoji> Bạn có thể tạo hình ảnh.\n<emoji id=5875371147595354391 >🥀</emoji> Bạn có thể dịch nhiều ngôn ngữ.\n<emoji id=5875371147595354391 >🥀</emoji> Tôi có thể tắt tiếng, bỏ tắt tiếng, chặn, kích người dùng..\n<emoji id=5875371147595354391 >🥀</emoji> Tính năng chào mừng đặc biệt \n<emoji id=5875371147595354391 >🥀</emoji> Các tính năng khác: Nhấp vào nút lệnh...\n\n๏ Để biết thông tin về các mô-đun và lệnh của tôi, nhấp vào nút trợ giúp."
start_3 : "Chào {0} <emoji id=6181554577238661818>🥀</emoji>,\nTôi là {1}\n\nCảm ơn bạn đã thêm tôi vào {2} <emoji id=6172389267352851556>🥀</emoji>, {3} giờ đây có thể phát nhạc trong cuộc trò chuyện này <emoji id=6215221185194497730>🥀</emoji>."
start_4 : "🎄 <b>Cần Nhóm Siêu Cấp (Supergroup)</b> 🎄\n\nVui lòng chuyển đổi <b>Nhóm</b> của bạn thành <b>Nhóm Siêu Cấp</b> và sau đó thêm lại tôi.\n\n<b>Cách làm Nhóm Siêu Cấp?</b>\n- Cài đặt lịch sử trò chuyện của nhóm thành <b>Hiển thị (Visible)</b> một lần."
start_5 : "<b>↝ Cuộc trò chuyện bị liệt vào danh sách đen ↜</b>\n\nCuộc trò chuyện này đã bị liệt vào danh sách đen trong cơ sở dữ liệu của {0}.\nHãy yêu cầu <a href={1}>Người dùng Sudo</a> gỡ danh sách đen hoặc truy cập <a href={2}>Kênh hỗ trợ</a>."
