setting_1 : "<u><b>{0} సెట్టింగుల ప్యానెల్</b></u>\n\n<b>చాట్ ID :</b> <code>{1}</code>\n<b>చాట్ టైటిల్ :</b> {2}\n\nసెట్టింగులను మార్చడానికి క్రింది బటన్లను క్లిక్ చేయండి."
setting_2 : "» నేరుగా (Direct) : సెర్చ్ ఫలితాలను నేరుగా ప్లే చేస్తుంది.\n\n» ఇన్లైన్ (Inline) : వీడియో మరియు ఆడియో మధ్య ఎంచుకోవడానికి ఇన్లైన్ బటన్లను ఇస్తుంది."
setting_3 : "» ప్రతి ఒక్కరూ : ఈ గ్రూప్‌లో ఎవరైనా అడ్మిన్ కమాండ్స్ [skip, pause, resume మొదలైనవి] ఉపయోగించవచ్చు.\n\n» అడ్మిన్లు మాత్రమే : అడ్మిన్లు మరియు అధీకృత వినియోగదారులు మాత్రమే అడ్మిన్ కమాండ్స్ ఉపయోగించగలరు."
setting_4 : "» అధీకృత వినియోగదారులు ఎవరూ కనుగొనబడలేదు."
setting_5 : "» గ్రూప్ : కమాండ్ ఇచ్చిన గ్రూప్‌లో సంగీతాన్ని ప్లే చేస్తుంది.\n\n» ఛానెల్ : మీకు నచ్చిన ఛానెల్‌లో సంగీతాన్ని ప్లే చేస్తుంది. /channelplay ద్వారా ఛానెల్ ID ని సెట్ చేయండి."
setting_6 : "» ప్రతి ఒక్కరూ : ఈ గ్రూప్‌లోని ఎవరైనా ఇక్కడ సంగీతాన్ని ప్లే చేయవచ్చు.\n\n» అడ్మిన్లు మాత్రమే : ఈ గ్రూప్‌లో అడ్మిన్లు మాత్రమే సంగీతాన్ని ప్లే చేయగలరు."
setting_7 : "» దయచేసి /channelplay ద్వారా ఛానెల్ ID ని సెట్ చేయండి."
setting_8 : "ఈ మోడ్ ఎనేబుల్ చేసినప్పుడు, అడ్మిన్ హక్కులు లేని వ్యక్తులు కూడా నిర్దిష్ట ఓట్ల తర్వాత అడ్మిన్ కమాండ్స్ ఉపయోగించవచ్చు."
setting_9 : "అడ్మిన్ కమాండ్స్ ఉపయోగించడానికి ప్రస్తుతం అవసరమైన ఓట్లు : {0}"
setting_10 : "ఓటింగ్ మోడ్ డిసేబుల్ చేయబడింది."
setting_11 : "కనీస ఓట్లు 2 ఉండాలి. మీరు 2 కంటే తక్కువ సెట్ చేయలేరు."
setting_12 : "గరిష్ట ఓట్లు 15 ఉండాలి. మీరు 15 కంటే ఎక్కువ సెట్ చేయలేరు."

