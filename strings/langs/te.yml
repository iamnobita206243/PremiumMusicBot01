cplay_1 : "» మీరు {0} ద్వారా ఏదైనా ఛానెల్‌లో లేదా మీ చాట్ యొక్క లింక్ చేయబడిన ఛానెల్‌లో సంగీతాన్ని ప్లే చేయవచ్చు.\n\n<b>లింక్ చేసిన ఛానెల్ కోసం :</b>\n<code>/channelplay linked</code>\n\n<b>మరేదైనా ఛానెల్ కోసం :</b>\n<code>/channelplay [CHANNEL_ID]</code>"
cplay_2 : "» ఈ చాట్‌కు ఎటువంటి లింక్ చేయబడిన ఛానెల్ లేదు."
cplay_3 : "» ఛానెల్ {0} కోసం సెట్ చేయబడింది.\nఛానెల్ ID : <code>{1}</code>"
cplay_4 : "» ఛానెల్‌ని పొందడంలో విఫలమైంది.\n\nమీరు మీ ఛానెల్‌లో బోట్‌ని జోడించారని మరియు అడ్మిన్‌గా ప్రమోట్ చేశారని నిర్ధారించుకోండి."
cplay_5 : "ఛానెల్‌లు మాత్రమే సపోర్ట్ చేయబడతాయి."
cplay_6 : "» ఈ గ్రూప్‌కి లింక్ చేయడానికి మీరు ఛానెల్ {0} కి <b>యజమాని</b> అయి ఉండాలి.\n<b>ఛానెల్ యజమాని :</b> @{1}\n\nబదులుగా మీరు మీ గ్రూప్‌ను ఆ ఛానెల్‌తో లింక్ చేయవచ్చు మరియు <code>/channelplay linked</code> ద్వారా లింక్ చేయడానికి ప్రయత్నించవచ్చు"
cplay_7 : "» ఛానెల్ ప్లే నిలిపివేయబడింది."

