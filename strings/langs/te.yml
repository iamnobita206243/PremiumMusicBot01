start_1 : "<emoji id=6172539951985464926>🥀</emoji> {0} ఆన్‌లైన్‌లో ఉంది, ప్రియతమా.\n\n<b>✫ అప్‌టైమ్ :</b> {1} <emoji id=6296577138615125756>🥀</emoji>"
start_2 : "హలో, {0} \nనేను {1}<emoji id=6172539951985464926>🥀</emoji>ని,\n\n<emoji id=5875371147595354391 >🥀</emoji> నా దగ్గర ప్రత్యేక ఫీచర్లు ఉన్నాయి.\n<emoji id=5875371147595354391 >🥀</emoji> ఆల్ ఇన్ వన్ బోట్.\n<emoji id=5875371147595354391 >🥀</emoji> మీరు వాయిస్ చాట్లలో పాటలు ప్లే చేయవచ్చు.\n<emoji id=5875371147595354391 >🥀</emoji> మీరు చిత్రాలను రూపొందించవచ్చు.\n<emoji id=5875371147595354391 >🥀</emoji> మీరు బహుళ భాషలను అనువదించవచ్చు.\n<emoji id=5875371147595354391 >🥀</emoji> నేను మ్యూట్, అన్ మ్యూట్, బ్యాన్, కిక్ చేయగలను..\n<emoji id=5875371147595354391 >🥀</emoji> ప్రత్యేక స్వాగతం \n<emoji id=5875371147595354391 >🥀</emoji> మరిన్ని ఫీచర్లు: కమాండ్ బటన్ క్లిక్ చేయండి...\n\n๏ నా మాడ్యూల్స్ మరియు కమాండ్స్ గురించి సమాచారం కోసం హెల్ప్ బటన్ క్లిక్ చేయండి."
start_3 : "హలో {0} <emoji id=6181554577238661818>🥀</emoji>,\nనేను {1}\n\nనన్ను {2} లో చేర్చినందుకు ధన్యవాదాలు <emoji id=6172389267352851556>🥀</emoji>, {3} ఇప్పుడు ఈ చాట్‌లో పాటలను ప్లే చేయగలదు <emoji id=6215221185194497730>🥀</emoji>."
start_4 : "🎄 <b>సూపర్ గ్రూప్ అవసరం</b> 🎄\n\nదయచేసి మీ <b>గ్రూప్</b> ని <b>సూపర్ గ్రూప్</b> గా మార్చండి మరియు నన్ను మళ్ళీ జోడించండి.\n\n<b>సూపర్ గ్రూప్ ఎలా చేయాలి?</b>\n- మీ గ్రూప్ చాట్ హిస్టరీని ఒకసారి <b>కనిపించేలా (Visible)</b> చేయండి."
start_5 : "<b>↝ బ్లాక్‌లిస్ట్ చేయబడిన చాట్ ↜</b>\n\nఈ చాట్ {0} డేటాబేస్‌లో బ్లాక్‌లిస్ట్ చేయబడింది.\nమీ చాట్‌ను అన్‌బ్లాక్‌లిస్ట్ చేయమని <a href={1}>సుడో వినియోగదారుని</a> అడగండి లేదా <a href={2}>సపోర్ట్ చాట్</a> ని సందర్శించండి."
start_6 : "😲 <b>పాట సమాచారం</b> 😲\n\n📌 <b>శీర్షిక :</b> {0}\n\n⏳ <b>సమయం :</b> {1} నిమిషాలు\n👀 <b>వీక్షణలు :</b> <code>{2}</code>\n⏰ <b>ప్రచురించిన తేదీ :</b> {3}\n📎 <b>ఛానెల్ :</b> <a href={4}>{5}</a>\n\n<u><b>🥀 సెర్చ్ పవర్డ్ బై {6}</b></u>"

help_1 : "మీకు సహాయం కావాల్సిన వర్గాన్ని ఎంచుకోండి.\nమీ ప్రశ్నలను <a href={0}>సపోర్ట్ చాట్</a> లో అడగండి\n\nఅన్ని కమాండ్స్ ని <code>/</code> తో ఉపయోగించవచ్చు"
help_2 : "మీ PM లో నా హెల్ప్ మెనూని పొందడానికి క్రింది బటన్ క్లిక్ చేయండి."

lang_1 : "» దయచేసి ఈ గ్రూప్ కోసం డిఫాల్ట్ భాషగా సెట్ చేయాలనుకుంటున్న భాషను ఎంచుకోండి :"
lang_2 : "భాష విజయవంతంగా మార్చబడింది."
lang_3 : "భాష మార్చడంలో విఫలమైంది."
