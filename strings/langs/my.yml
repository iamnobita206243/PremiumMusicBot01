start_4 : "🎄 <b>Supergroup လိုအပ်သည်</b> 🎄\n\nကျေးဇူးပြု၍ သင့် <b>အဖွဲ့</b> ကို <b>Supergroup</b> သို့ ပြောင်းပြီး ကျွန်ုပ်ကို ထပ်ထည့်ပါ။\n\n<b>Supergroup ဘယ်လိုလုပ်မလဲ?</b>\n- သင့်အဖွဲ့၏ ချတ်မှတ်တမ်းကို <b>visible</b> ဖြစ်စေပါ။"
