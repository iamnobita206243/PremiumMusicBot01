setting_5 : "» အဖွဲ့ : အမိန့်ပေးသည့် အဖွဲ့ထဲတွင် သီချင်းဖွင့်သည်။\n\n» ချန်နယ် : သင်လိုချင်သော ချန်နယ်တွင် သီချင်းဖွင့်သည်။ ချန်နယ် ID ကို /channelplay ဖြင့် သတ်မှတ်ပါ။"
