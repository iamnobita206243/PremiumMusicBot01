start_2 : "Hallo, {0} \nIch bin {1}<emoji id=6172539951985464926>🥀</emoji>,\n\n<emoji id=5875371147595354391 >🥀</emoji> Ich habe spezielle Funktionen.\n<emoji id=5875371147595354391 >🥀</emoji> All-in-One-Bot.\n<emoji id=5875371147595354391 >🥀</emoji> Du kannst Lieder in Sprach-Chats abspielen.\n<emoji id=5875371147595354391 >🥀</emoji> Du kannst Bilder generieren.\n<emoji id=5875371147595354391 >🥀</emoji> Du kannst mehrere Sprachen übersetzen.\n<emoji id=5875371147595354391 >🥀</emoji> Ich kann muten, entmuten, bannen, entbannen, kicken...\n<emoji id=5875371147595354391 >🥀</emoji> Spezielle Begrüßung \n<emoji id=5875371147595354391 >🥀</emoji> Mehr Funktionen: Klicken Sie auf die Befehlsschaltfläche...\n\n๏ Klicken Sie auf die Hilfe-Schaltfläche, um Informationen über meine Module und Befehle zu erhalten."
start_3 : "Hallo {0} <emoji id=6181554577238661818>🥀</emoji>,\nIch bin {1}\n\nDanke, dass du mich zu {2} hinzugefügt hast <emoji id=6172389267352851556>🥀</emoji>, {3} kann jetzt Lieder in diesem Chat abspielen <emoji id=6215221185194497730>🥀</emoji>."
start_4 : "🎄 <b>Supergruppe erforderlich</b> 🎄\n\nBitte konvertiere deine <b>Gruppe</b> in eine <b>Supergruppe</b> und füge mich dann erneut hinzu.\n\n<b>Wie erstelle ich eine Supergruppe?</b>\n- Mache den Chat-Verlauf deiner Gruppe einmal <b>sichtbar</b>."
start_5 : "<b>↝ Chat auf der schwarzen Liste ↜</b>\n\nDieser Chat ist in der Datenbank von {0} auf der schwarzen Liste.\nBitten Sie einen <a href={1}>Sudo-Benutzer</a>, Ihren Chat von der schwarzen Liste zu entfernen, oder besuchen Sie den <a href={2}>Support-Chat.</a>"
