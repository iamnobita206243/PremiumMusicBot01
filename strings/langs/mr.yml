start_1 : "<emoji id=6172539951985464926>🥀</emoji> {0} ऑनलाइन आहे.\n\n<b>✫ अपटाइम :</b> {1} <emoji id=6296577138615125756>🥀</emoji>"
start_2 : "हॅलो {0}, \nमी {1}<emoji id=6172539951985464926>🥀</emoji> आहे,\n\n<emoji id=5875371147595354391 >🥀</emoji> माझ्याकडे खास फीचर्स आहेत.\n<emoji id=5875371147595354391 >🥀</emoji> ऑल इन वन बोट.\n<emoji id=5875371147595354391 >🥀</emoji> तुम्ही व्हॉइस चॅटमध्ये गाणी ऐकू शकता.\n<emoji id=5875371147595354391 >🥀</emoji> तुम्ही फोटो तयार करू शकता.\n<emoji id=5875371147595354391 >🥀</emoji> तुम्ही विविध भाषांचे भाषांतर करू शकता.\n<emoji id=5875371147595354391 >🥀</emoji> मी म्यूट, अनम्यूट, बॅन, किक करू शकतो..\n<emoji id=5875371147595354391 >🥀</emoji> खास स्वागत फीचर \n<emoji id=5875371147595354391 >🥀</emoji> अधिक फीचर्ससाठी कमांड बटण क्लिक करा...\n\n๏ माझ्या मॉड्युल्स आणि कमांड्सबद्दल जाणून घेण्यासाठी हेल्प बटण क्लिक करा."
start_3 : "हॅलो {0} <emoji id=6181554577238661818>🥀</emoji>,\nमी {1} आहे\n\nमला {2} मध्ये जोडल्याबद्दल धन्यवाद <emoji id=6172389267352851556>🥀</emoji>, {3} आता या चॅटमध्ये गाणी वाजवू शकते <emoji id=6211111111111111111>🥀</emoji>."
start_4 : "🎄 <b>सुपर ग्रुप आवश्यक आहे</b> 🎄\n\nकृपया तुमच्या <b>ग्रुपला</b> <b>सुपर ग्रुप</b> मध्ये बदला आणि मग मला पुन्हा जोडा.\n\n<b>सुपर ग्रुप कसा बनवायचा?</b>\n- तुमच्या ग्रुपची चॅट हिस्ट्री एकदा <b>दृश्यमान (Visible)</b> करा."
start_5 : "<b>↝ ब्लॅकलिस्टेड चॅट ↜</b>\n\nहे चॅट {0} डेटाबेसमध्ये ब्लॅकलिस्ट आहे.\nचॅट अनब्लॅकलिस्ट करण्यासाठी <a href={1}>सुडो वापरकर्त्याला</a> विनंती करा किंवा <a href={2}>सपोर्ट चॅट</a> ला भेट द्या."
