start_1 : "<emoji id=6172539951985464926>🥀</emoji> {0} ออนไลน์แล้วครับ\n\n<b>✫ เวลาทำงาน :</b> {1} <emoji id=6296577138615125756>🥀</emoji>"
start_2 : "สวัสดี {0}, \nผมคือ {1}<emoji id=6172539951985464926>🥀</emoji>,\n\n<emoji id=5875371147595354391 >🥀</emoji> ผมมีคุณสมบัติพิเศษมากมาย\n<emoji id=5875371147595354391 >🥀</emoji> บอทแบบครบวงจร\n<emoji id=5875371147595354391 >🥀</emoji> คุณสามารถเล่นเพลงในการแชทด้วยเสียงได้\n<emoji id=5875371147595354391 >🥀</emoji> คุณสามารถสร้างรูปภาพได้\n<emoji id=5875371147595354391 >🥀</emoji> คุณสามารถแปลภาษาได้หลายภาษา\n<emoji id=5875371147595354391 >🥀</emoji> ผมสามารถปิดเสียง เปิดเสียง แบน เตะผู้ใช้ได้..\n<emoji id=5875371147595354391 >🥀</emoji> การต้อนรับแบบพิเศษ\n<emoji id=5875371147595354391 >🥀</emoji> คุณสมบัติอื่นๆ : คลิกปุ่มคำสั่ง...\n\n๏ สำหรับข้อมูลเกี่ยวกับมอดูลและคำสั่งของผม คลิกปุ่มช่วยเหลือ"
start_3 : "สวัสดี {0} <emoji id=6181554577238661818>🥀</emoji>,\nผมคือ {1}\n\nขอบคุณที่เพิ่มผมใน {2} <emoji id=6172389267352851556>🥀</emoji>, {3} สามารถเล่นเพลงในแชทนี้ได้แล้ว <emoji id=6215221185194497730>🥀</emoji>"
start_4 : "🎄 <b>ต้องการซูเปอร์กรุ๊ป</b> 🎄\n\nกรุณาเปลี่ยน <b>กลุ่ม</b> ของคุณให้เป็น <b>ซูเปอร์กรุ๊ป</b> แล้วเพิ่มผมเข้ามาใหม่\n\n<b>วิธีสร้างซูเปอร์กรุ๊ป?</b>\n- ตั้งค่าประวัติการสนทนาของกลุ่มให้เป็น <b>แสดง (Visible)</b> หนึ่งครั้ง"
start_5 : "<b>↝ แชทที่ติดบัญชีดำ ↜</b>\n\nแชทนี้ถูกติดบัญชีดำในฐานข้อมูลของ {0}\nโปรดติดต่อ <a href={1}>ผู้ใช้ Sudo</a> เพื่อปลดบัญชีดำ หรือไปที่ <a href={2}>แชทสนับสนุน</a>"
start_6 : "😲 <b>ข้อมูลเพลง</b> 😲\n\n📌 <b>ชื่อเพลง :</b> {0}\n\n⏳ <b>เวลา :</b> {1} นาที\n👀 <b>ยอดดู :</b> <code>{2}</code>\n⏰ <b>วันที่เผยแพร่ :</b> {3}\n📎 <b>ช่อง :</b> <a href={4}>{5}</a>\n\n<u><b>🥀 การค้นหาโดย {6}</b></u>"

