start_1 : "<emoji id=6172539951985464926>🥀</emoji> {0} آنلاین شد.\n\n<b>✫ مدت زمان فعالیت:</b> {1} <emoji id=6296577138615125756>🥀</emoji>"
start_2 : "سلام {0}، \nمن {1}<emoji id=6172539951985464926>🥀</emoji> هستم،\n\n<emoji id=5875371147595354391 >🥀</emoji> من ویژگی‌های ویژه‌ای دارم.\n<emoji id=5875371147595354391 >🥀</emoji> ربات همه‌کاره.\n<emoji id=5875371147595354391 >🥀</emoji> می‌توانید آهنگ‌ها را در چت‌های صوتی پخش کنید.\n<emoji id=5875371147595354391 >🥀</emoji> می‌توانید تصویر تولید کنید.\n<emoji id=5875371147595354391 >🥀</emoji> می‌توانید بسیاری از زبان‌ها را ترجمه کنید.\n<emoji id=5875371147595354391 >🥀</emoji> من می‌توانم بی‌صدا، باصدا، مسدود، اخراج و... کنم.\n<emoji id=5875371147595354391 >🥀</emoji> خوش‌آمدگویی ویژه \n<emoji id=5875371147595354391 >🥀</emoji> سایر ویژگی‌ها: روی دکمه دستورات کلیک کنید...\n\n๏ برای اطلاعات در مورد ماژول‌ها و دستورات من، روی دکمه راهنما کلیک کنید."
start_3 : "سلام {0} <emoji id=6181554577238661818>🥀</emoji>،\nمن {1} هستم\n\nممنون که من را به {2} اضافه کردید <emoji id=6172389267352851556>🥀</emoji>، {3} اکنون می‌تواند در این چت آهنگ پخش کند <emoji id=6215221185194497730>🥀</emoji>."
start_4 : "🎄 <b>نیاز به سوپرگروه</b> 🎄\n\nلطفاً <b>گروه</b> خود را به <b>سوپرگروه</b> تبدیل کنید و سپس دوباره من را اضافه کنید.\n\n<b>چگونه سوپرگروه بسازیم؟</b>\n- سابقه چت گروه خود را یک بار روی <b>نمایان (Visible)</b> تنظیم کنید."
start_5 : "<b>↝ چت در لیست سیاه ↜</b>\n\nاین چت در پایگاه داده {0} در لیست سیاه قرار دارد.\nاز یک <a href={1}>کاربر سودو</a> بخواهید که آن را خارج کند یا به <a href={2}>چت پشتیبانی</a> مراجعه کنید."
start_6 : "😲 <b>اطلاعات آهنگ</b> 😲\n\n📌 <b>عنوان:</b> {0}\n\n⏳ <b>زمان:</b> {1} دقیقه\n👀 <b>بازدید:</b> <code>{2}</code>\n⏰ <b>تاریخ انتشار:</b> {3}\n📎 <b>کانال:</b> <a href={4}>{5}</a>\n\n<u><b>🥀 جستجو توسط {6}</b></u>"

