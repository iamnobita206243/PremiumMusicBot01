md_5 : "» ʙᴏᴛ ᴍᴜsᴛ ʜᴀᴠᴇ `ᴅᴇʟᴇᴛᴇ ᴍᴇssᴀɢᴇs`, `ɪɴᴠɪᴛᴇ ᴜsᴇʀs` ᴀɴᴅ `ᴘʀᴏᴍᴏᴛᴇ ᴍᴇᴍʙᴇʀs` ᴘᴇʀᴍɪssɪᴏɴs ɪɴ ᴛʜɪs ɢʀᴏᴜᴘ ᴛᴏ ᴇɴᴀʙʟᴇ ᴛʜɪs ғᴇᴀᴛᴜʀᴇ."
md_6 : "» ᴀᴜᴛᴏ-ᴀᴅᴅɪɴɢ ᴘʀᴏᴛᴇᴄᴛɪᴏɴ ᴜsᴇʀʙᴏᴛ..."
md_7 : "» ᴍᴇᴅɪᴀ ᴅᴇʟᴇᴛᴇ ᴛᴀʀɢᴇᴛ ᴛʏᴘᴇ sᴇᴛ ᴛᴏ {0}."