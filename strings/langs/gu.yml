start_2 : "નમસ્તે, {0} \nહું {1}<emoji id=6172539951985464926>🥀</emoji> છું,\n\n<emoji id=5875371147595354391 >🥀</emoji> મારી પાસે ખાસ સુવિધાઓ છે.\n<emoji id=5875371147595354391 >🥀</emoji> ઓલ-ઇન-વન બોટ.\n<emoji id=5875371147595354391 >🥀</emoji> તમે વૉઇસ ચેટમાં ગીતો વગાડી શકો છો.\n<emoji id=5875371147595354391 >🥀</emoji> તમે છબીઓ બનાવી શકો છો.\n<emoji id=5875371147595354391 >🥀</emoji> તમે ઘણી ભાષાઓમાં અનુવાદ કરી શકો છો.\n<emoji id=5875371147595354391 >🥀</emoji> હું મ્યૂટ, અનમ્યૂટ, બેન, કિક વગેરે કરી શકું છું..\n<emoji id=5875371147595354391 >🥀</emoji> વિશેષ સ્વાગત \n<emoji id=5875371147595354391 >🥀</emoji> અન્ય સુવિધાઓ : કમાન્ડ બટન પર ક્લિક કરો...\n\n๏ મારા મોડ્યુલો અને કમાન્ડ વિશેની માહિતી માટે હેલ્પ બટન પર ક્લિક કરો."
start_3 : "નમસ્તે {0} <emoji id=6181554577238661818>🥀</emoji>,\nહું {1} છું\n\nમને {2} માં ઉમેરવા માટે આભાર <emoji id=6172389267352851556>🥀</emoji>, {3} હવે આ ચેટમાં ગીતો વગાડી શકે છે <emoji id=6215221185194497730>🥀</emoji>."
