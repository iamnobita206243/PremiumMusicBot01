cplay_1 : "» நீங்கள் {0} மூலம் எந்த சேனலிலும் அல்லது உங்கள் அரட்டையின் இணைக்கப்பட்ட சேனலிலும் பாடல்களை இயக்கலாம்.\n\n<b>இணைக்கப்பட்ட சேனலுக்கு :</b>\n<code>/channelplay linked</code>\n\n<b>வேறு எந்த சேனலுக்கும் :</b>\n<code>/channelplay [CHANNEL_ID]</code>"
