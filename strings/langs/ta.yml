gstats_3 : "<b><u>{0}-ன் புள்ளிவிவரங்கள் மற்றும் தகவல் :</u></b>\n\n<b>உதவியாளர்கள் :</b> <code>{1}</code>\n<b>தடை செய்யப்பட்டவை :</b> <code>{2}</code>\n<b>அரட்டைகள் :</b> <code>{3}</code>\n<b>பயனர்கள் :</b> <code>{4}</code>\n<b>தொகுதிகள் :</b> <code>{5}</code>\n<b>Sudo பயனர்கள் :</b> <code>{6}</code>\n\n<b>உதவியாளர் தானாக வெளியேறுதல் :</b> {7}\n<b>பாடல் இயங்கும் கால வரம்பு :</b> {8} நிமிடங்கள்"
gstats_4 : "இந்த பொத்தான் Sudo பயனர்களுக்கு மட்டுமே."
gstats_5 : "<b><u>{0}-ன் புள்ளிவிவரங்கள் மற்றும் தகவல் :</u></b>\n\n<b>தொகுதிகள் :</b> <code>{1}</code>\n<b>இயங்குதளம் :</b> <code>{2}</code>\n<b>RAM :</b> <code>{3}</code>\n<b>இயற்பியல் கோர்கள் :</b> <code>{4}</code>\n<b>மொத்த கோர்கள் :</b> <code>{5}</code>\n<b>CPU அதிர்வெண் :</b> <code>{6}</code>\n\n<b>Python :</b> <code>{7}</code>\n<b>Pyrogram :</b> <code>{8}</code>\n<b>Py-TgCalls :</b> <code>{9}</code>\n\n<b>கிடைக்கக்கூடிய சேமிப்பு :</b> <code>{10} GiB</code>\n<b>பயன்படுத்தப்பட்ட சேமிப்பு :</b> <code>{11} GiB</code>\n<b>மீதமுள்ள சேமிப்பு :</b> <code>{12} GiB</code>\n\n<b>சேவை வழங்கப்படும் அரட்டைகள் :</b> <code>{13}</code>\n<b>சேவை வழங்கப்படும் பயனர்கள் :</b> <code>{14}</code>\n<b>தடை செய்யப்பட்ட பயனர்கள் :</b> <code>{15}</code>\n<b>Sudo பயனர்கள் :</b> <code>{16}</code>\n\n<b>மொத்த DB அளவு :</b> <code>{17} MB</code>\n<b>மொத்த DB சேமிப்பு :</b> <code>{18} MB</code>\n<b>மொத்த DB தொகுப்புகள் :</b> <code>{19}</code>\n<b>மொத்த DB சாவிகள் :</b> <code>{20}</code>"

