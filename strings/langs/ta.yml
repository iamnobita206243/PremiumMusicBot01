play_4 : "<b>நிர்வாகிகள் மட்டும் இயக்க முடியும்</b>\nஇந்தச் அரட்டையின் நிர்வாகிகள் மட்டுமே பாடல்களை இயக்க அனுமதிக்கப்படுவார்கள்\n\n/playmode மூலம் பயன்முறையை மாற்றவும்"
