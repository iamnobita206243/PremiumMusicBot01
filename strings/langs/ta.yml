cplay_3 : "» சேனல் {0}-க்காக அமைக்கப்பட்டது.\nசேனல் ID : <code>{1}</code>"
cplay_4 : "» சேனலைப் பெற முடியவில்லை.\n\nஉங்கள் சேனலில் பாட்டைச் சேர்த்து, நிர்வாகியாக உயர்த்தியுள்ளீர்களா என உறுதிப்படுத்தவும்."
cplay_5 : "சேனல்கள் மட்டுமே ஆதரிக்கப்படுகின்றன."
cplay_6 : "» உங்கள் குழுவை இணைக்க சேனல் {0}-ன் <b>உரிமையாளராக</b> இருக்க வேண்டும்.\n<b>சேனல் உரிமையாளர் :</b> @{1}\n\nமாற்றாக உங்கள் குழுவை அந்தச் சேனலுடன் இணைத்துவிட்டு <code>/channelplay linked</code> மூலம் இணைக்க முயற்சி செய்யலாம்"
cplay_7 : "» சேனல் பாடல் இயக்குதல் முடக்கப்பட்டுள்ளது."

