start_1 : "<emoji id=6172539951985464926>🥀</emoji> {0} ஆன்லைனில் வந்துவிட்டது, செல்லமே.\n\n<b>✫ இயங்கிய நேரம் :</b> {1} <emoji id=6296577138615125756>🥀</emoji>"
start_2 : "வணக்கம், {0} \nநான் {1}<emoji id=6172539951985464926>🥀</emoji>,\n\n<emoji id=5875371147595354391 >🥀</emoji> என்னிடம் சிறப்பு அம்சங்கள் உள்ளன.\n<emoji id=5875371147595354391 >🥀</emoji> ஆல்-இன்-ஒன் பாட்.\n<emoji id=5875371147595354391 >🥀</emoji> வாய்ஸ் சேட்களில் பாடல்களை இயக்கலாம்.\n<emoji id=5875371147595354391 >🥀</emoji> படங்களை உருவாக்கலாம்.\n<emoji id=5875371147595354391 >🥀</emoji> பல மொழிகளை மொழிபெயர்க்கலாம்.\n<emoji id=5875371147595354391 >🥀</emoji> மியூட், அன்மியூட், தடை, நீக்கம் போன்றவை செய்வேன்..\n<emoji id=5875371147595354391 >🥀</emoji> சிறப்பு வரவேற்பு \n<emoji id=5875371147595354391 >🥀</emoji> கூடுதல் அம்சங்கள்: கமாண்ட் பட்டனை கிளிக் செய்யவும்...\n\n๏ எனது தொகுதிகள் மற்றும் கட்டளைகள் பற்றிய தகவலுக்கு உதவி பட்டனை கிளிக் செய்யவும்."
start_3 : "வணக்கம் {0} <emoji id=6181554577238661818>🥀</emoji>,\nநான் {1}\n\nஎன்னை {2}-ல் சேர்த்ததற்கு நன்றி <emoji id=6172389267352851556>🥀</emoji>, {3} இப்போது இந்தச் அரட்டையில் பாடல்களை இயக்க முடியும் <emoji id=6215221185194497730>🥀</emoji>."
start_4 : "🎄 <b>சூப்பர் குரூப் தேவை</b> 🎄\n\nதயவுசெய்து உங்கள் <b>குழுவை</b> <b>சூப்பர் குரூப்பாக</b> மாற்றிவிட்டு, பிறகு என்னை மீண்டும் சேர்க்கவும்.\n\n<b>சூப்பர் குரூப் செய்வது எப்படி?</b>\n- உங்கள் குழுவின் சேட் ஹிஸ்டரியை <b>தெரியும்படி (Visible)</b> ஒருமுறை மாற்றவும்."
start_5 : "<b>↝ தடை செய்யப்பட்ட அரட்டை ↜</b>\n\nஇந்தச் அரட்டை {0}-ன் தரவுத்தளத்தில் தடை செய்யப்பட்டுள்ளது.\nகட்டவிழ்க்க (Unblacklist) ஒரு <a href={1}>சுடோ பயனர்</a>-ஐக் கேட்கவும் அல்லது <a href={2}>உதவி அரட்டை</a>-க்குச் செல்லவும்."
start_6 : "😲 <b>பாடல் தகவல்</b> 😲\n\n📌 <b>தலைப்பு :</b> {0}\n\n⏳ <b>நேரம் :</b> {1} நிமிடங்கள்\n👀 <b>பார்வைகள் :</b> <code>{2}</code>\n⏰ <b>வெளியிடப்பட்ட தேதி :</b> {3}\n📎 <b>சேனல் :</b> <a href={4}>{5}</a>\n\n<u><b>🥀 தேடல் {6}-ஆல் வழங்கப்படுகிறது</b></u>"

help_1 : "உங்களுக்கு உதவி தேவைப்படும் வகையைத் தேர்ந்தெடுக்கவும்.\nஉங்கள் கேள்விகளை <a href={0}>உதவி அரட்டை</a>-யில் கேட்கவும்\n\nஅனைத்து கட்டளைகளையும் இதைப் பயன்படுத்தலாம் : <code>/</code>"
help_2 : "உங்கள் PM-ல் எனது உதவி மெனுவைப் பெற கீழே உள்ள பட்டனை கிளிக் செய்யவும்."

lang_1 : "» இந்த குழுவின் இயல்புநிலை மொழியாக எதை அமைக்க வேண்டும் எனத் தேர்ந்தெடுக்கவும் :"
lang_2 : "மொழி வெற்றிகரமாக மாற்றப்பட்டது."
lang_3 : "மொழியை மாற்றுவதில் தோல்வி."
lang_4 : "நீங்கள் ஏற்கனவே அதே மொழியைப் பயன்படுத்துகிறீர்கள்."

setting_1 : "<u><b>அமைப்புகள் குழு {0}</b></u>\n\n<b>அரட்டை ID :</b> <code>{1}</code>\n<b>அரட்டை தலைப்பு :</b> {2}\n\nஅமைப்புகளை மாற்ற கீழே உள்ள பொத்தான்களைக் கிளிக் செய்யவும்."
setting_2 : "» நேரடியாக (Direct) : தேடல் முடிவுகளை நேரடியாக இயக்குகிறது.\n\n» இன்லைனில் (Inline) : வீடியோ மற்றும் ஆடியோவுக்கு இடையே தேர்ந்தெடுக்க பட்டன்களை வழங்குகிறது."
setting_3 : "» அனைவரும் : இந்த குழுவில் உள்ள எவரும் நிர்வாக கட்டளைகளை [skip, pause, resume போன்றவை] பயன்படுத்தலாம்.\n\n» நிர்வாகிகள் மட்டும் : நிர்வாகிகள் மற்றும் அங்கீகரிக்கப்பட்ட பயனர்கள் மட்டுமே நிர்வாக கட்டளைகளைப் பயன்படுத்த முடியும்."
setting_4 : "» அங்கீகரிக்கப்பட்ட பயனர்கள் யாரும் காணப்படவில்லை."
setting_5 : "» குழு : கட்டளை வழங்கப்பட்ட குழுவிலேயே பாடல்களை இயக்குகிறது.\n\n» சேனல் : நீங்கள் விரும்பும் சேனலில் பாடல்களை இயக்குகிறது. சேனல் ID-ஐ /channelplay மூலம் அமைக்கவும்."
setting_6 : "» அனைவரும் : இந்த குழுவில் உள்ள எவரும் இங்கு பாடல்களை இயக்கலாம்.\n\n» நிர்வாகிகள் மட்டும் : இந்த குழுவில் நிர்வாகிகள் மட்டுமே பாடல்களை இயக்க முடியும்."
setting_7 : "» தயவுசெய்து சேனல் ID-ஐ /channelplay மூலம் அமைக்கவும்."
setting_8 : "இந்த பயன்முறை முடுக்கிவிடப்பட்டால், நிர்வாக உரிமைகள் இல்லாதவர்களும் ஒரு குறிப்பிட்ட வாக்கு எண்ணிக்கையின் பிறகு நிர்வாக கட்டளைகளைப் பயன்படுத்தலாம்."
setting_9 : "நிர்வாக கட்டளைகளைப் பயன்படுத்த தற்போது தேவையான வாக்குகள் : {0}"
setting_10 : "வாக்களிப்பு பயன்முறை முடக்கப்பட்டுள்ளது."
setting_11 : "குறைந்தபட்ச வாக்குகள் 2 ஆக இருக்க வேண்டும். 2-க்கு குறைவாக அமைக்க முடியாது."
setting_12 : "அதிகபட்ச வாக்குகள் 15 ஆக இருக்க வேண்டும். 15-க்கு அதிகமாக அமைக்க முடியாது."

